<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهانينا! أنت الآن مصمم في طموح</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --navy: #0a192f; --orange: #ff6b00; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 450px; border-top: 8px solid var(--orange); animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform: scale(0); }
        @keyframes popIn { to { transform: scale(1); } }
        h1 { color: var(--navy); font-size: 2rem; margin-bottom: 10px; }
        .msg { color: #666; font-size: 1.1rem; line-height: 1.6; margin-bottom: 25px; }
        .badge { display: inline-block; background: var(--navy); color: var(--orange); padding: 10px 25px; border-radius: 30px; font-weight: bold; font-size: 1.2rem; }
        .emoji { font-size: 3rem; margin-bottom: 10px; }
        .btn-join { background: var(--orange); color: white; text-decoration: none; padding: 12px 30px; border-radius: 10px; display: inline-block; margin-top: 25px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(255, 107, 0, 0.3); }
        .btn-join:hover { background: var(--navy); transform: translateY(-3px); box-shadow: 0 6px 15px rgba(10, 25, 47, 0.3); }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🎨✨</div>
        <h1>أهلاً بك يا <span id="name">مبدع</span>!</h1>
        <p class="msg">بناءً على حسك الفني وإبداعك المتميز، يسعدنا إعلامك بأنه تم قبولك رسمياً لتكون "المهندس البصري" لعائلة طموح. جاهز لرسم الأثر؟</p>
        <div class="badge">قسم التصميم (Graphic Design)</div>
        <br>
        <a href="https://t.me/+6Li_mFpWIF9kNDA0" class="btn-join" target="_blank">انضم لمجموعة العمل 🚀</a>
        <p style="margin-top: 25px; color: #888; font-style: italic; font-size: 0.9rem;">"لنكن البداية، وليكن طموحنا قصة نجاح"</p>
    </div>
    <script>
        const name = new URLSearchParams(window.location.search).get('name') || "مبدع";
        document.getElementById('name').innerText = name;
        setTimeout(() => confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#0a192f', '#ff6b00'] }), 500);
    </script>
</body>
</html>
